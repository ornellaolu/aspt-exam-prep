        title: "Introduction to Phlebotomy & the Healthcare System",
        content: "<h2>What is a Phlebotomist?</h2><p>A phlebotomist is a healthcare professional trained to draw blood from patients. Think of yourself as a bridge between the patient and the laboratory.</p><h3>Your Main Responsibilities:</h3><ul><li>Safely drawing blood from patients</li><li>Labeling specimens correctly</li><li>Following strict safety protocols</li><li>Communicating calmly with patients</li><li>Maintaining accurate records</li></ul><h2>Your Scope of Practice</h2><p>As a phlebotomist, you draw blood. You don't diagnose diseases, interpret lab results, or advise patients on medical conditions. But you ARE responsible for proper specimen collection.</p><h2>Healthcare Settings</h2><p>Phlebotomists work in: hospitals, outpatient clinics, reference laboratories, blood banks, urgent care centers, and point-of-care locations.</p><h2>Why Certification Matters</h2><ul><li>Shows employers you know your stuff</li><li>Provides legal protection</li><li>Leads to career advancement</li><li>ASPT certification is the gold standard</li></ul>",

        content: "<h2>The Heart: Your Body's Pump</h2><p>The heart is a four-chambered pump with two main jobs: pump oxygen-poor blood to the lungs, and pump oxygen-rich blood throughout the body.</p><h3>The Four Chambers:</h3><ul><li><strong>Right atrium</strong> — receives oxygen-poor blood from body</li><li><strong>Right ventricle</strong> — pumps to lungs</li><li><strong>Left atrium</strong> — receives oxygen-rich blood from lungs</li><li><strong>Left ventricle</strong> — pumps to entire body (strongest chamber)</li></ul><h2>Blood Vessels: The Highway System</h2><h3>Arteries:</h3><ul><li>Carry blood AWAY from heart</li><li>High pressure, thick walls</li><li>Bright red blood (oxygen-rich)</li><li>Deep vessels — avoid in phlebotomy</li></ul><h3>Veins:</h3><ul><li>Carry blood TOWARD heart</li><li>Low pressure, thin walls</li><li>Dark red blood (oxygen-poor)</li><li>Visible under skin — THIS IS WHERE YOU DRAW</li><li>Have valves to prevent backflow</li></ul><h3>Capillaries:</h3><ul><li>Tiny vessels connecting arteries to veins</li><li>Ultra-thin walls for gas exchange</li></ul><h2>Blood Composition</h2><p>When you draw blood, you're drawing: <strong>Plasma (55%)</strong> - yellowish liquid with proteins and nutrients, and <strong>Blood Cells (45%)</strong> - red cells (oxygen transport), white cells (immune), platelets (clotting).</p>",

        ]

        title: "Venipuncture Procedure & Technique",
        content: "<h2>Venipuncture Basics</h2><p>Venipuncture is the procedure of entering a vein to collect blood. It requires skill, sterility, and patient care.</p><h2>Essential Equipment</h2><ul><li>Sterile needle (20-23 gauge typical)</li><li>Tube holder/adapter</li><li>Collection tubes (EDTA, SST, lithium heparin)</li><li>Alcohol prep pad (70% isopropyl)</li><li>Gauze pads</li><li>Bandage</li><li>Gloves and PPE</li></ul><h2>The Venipuncture Procedure</h2><ol><li>Identify patient and verify orders</li><li>Select appropriate site (median cubital vein preferred)</li><li>Apply tourniquet 4-6 inches above site</li><li>Clean with alcohol prep (30 seconds)</li><li>Insert needle at 15-30 degree angle</li><li>Thread needle into vein</li><li>Allow blood to flow into tubes</li><li>Release tourniquet</li><li>Remove needle</li><li>Apply pressure with gauze</li><li>Label specimen immediately</li></ol><h2>Common Sites</h2><ul><li><strong>Median cubital</strong> - Best choice, easily accessible</li><li><strong>Cephalic</strong> - Lateral forearm</li><li><strong>Basilic</strong> - Medial forearm, deeper, harder to find</li></ul>",

        content: "<h2>Understanding Collection Tubes</h2><p>Different tests require different tubes with different additives. Using the wrong tube invalidates the test.</p><h2>Common Tube Types</h2><h3>EDTA (Purple/Lavender Top)</h3><ul><li>Anticoagulant: Ethylenediaminetetraacetic acid</li><li>Used for: CBC (complete blood count), hematology tests</li><li>Mix thoroughly by inverting 8-10 times</li></ul><h3>SST/Serum Separator (Gold/Yellow Top)</h3><ul><li>Contains clot activator & gel separator</li><li>Used for: Chemistry tests, serology</li><li>Allow to sit 5-10 minutes for clotting</li></ul><h3>Lithium Heparin (Green Top)</h3><ul><li>Anticoagulant: Lithium heparin</li><li>Used for: Plasma chemistry tests</li><li>Mix gently immediately after draw</li></ul><h3>Sodium Citrate (Blue Top)</h3><ul><li>Anticoagulant: Sodium citrate</li><li>Used for: Coagulation studies (PT, PTT)</li><li>Fill to exact line - volume critical</li></ul><h2>Order of Draw (Critical!)</h2><ol><li>Blood culture bottles (yellow/black)</li><li>SST/Serum (gold)</li><li>EDTA (purple)</li><li>Heparin (green)</li><li>Citrate (blue)</li></ol><p>Wrong order = cross-contamination = invalid results</p>",

      {
        id: 5,
        title: "Specimen Handling & Errors",
        content: "<h2>Proper Specimen Handling</h2><p>Specimen quality directly impacts test results. Poor handling = invalid tests = patient harm.</p><h2>Critical Handling Rules</h2><ul><li>Label immediately after draw (3 identifiers)</li><li>Keep specimens at correct temperature</li><li>Prevent hemolysis (breaking RBCs)</li><li>Mix tubes thoroughly per protocol</li><li>Prevent evaporation (cap all tubes)</li><li>Transport to lab promptly</li></ul><h2>Common Pre-Analytical Errors</h2><h3>Hemolysis</h3><ul><li><strong>Cause:</strong> RBCs rupture, releasing hemoglobin</li><li><strong>Results in:</strong> False potassium elevation, invalid results</li><li><strong>Prevention:</strong> Smooth venipuncture, don't shake tube</li></ul><h3>Hemoconcentration</h3><ul><li><strong>Cause:</strong> Prolonged tourniquet application (&gt;1 minute)</li><li><strong>Results in:</strong> Falsely elevated values</li><li><strong>Prevention:</strong> Keep tourniquet under 1 minute</li></ul><h3>Clotting in Anticoagulant Tubes</h3><ul><li><strong>Cause:</strong> Incomplete fill or inadequate mixing</li><li><strong>Results in:</strong> Tube rejection</li><li><strong>Prevention:</strong> Fill to exact level, mix immediately</li></ul><h2>Temperature Control</h2><ul><li><strong>Room temperature:</strong> Chemistry, serology (routine)</li><li><strong>Refrigerated (2-8°C):</strong> Coagulation studies, blood cultures</li><li><strong>Frozen:</strong> Some hormones, special studies</li></ul>",

        content: "<h2>OSHA Bloodborne Pathogens Standard</h2><p>Federal law (OSHA) requires specific safety measures to protect against HIV, Hepatitis B, Hepatitis C, and other bloodborne pathogens.</p><h2>Standard Precautions</h2><ul><li><strong>Gloves:</strong> Always wear. Change between patients.</li><li><strong>Face protection:</strong> Wear if splash risk</li><li><strong>Gown:</strong> Wear if contamination risk</li><li><strong>Hand hygiene:</strong> Before and after contact</li><li><strong>Sharps safety:</strong> Never recap needles. Use sharps containers.</li></ul><h2>Needle Safety</h2><ul><li>Use safety-engineered devices (automatic retract)</li><li>Dispose of needles immediately in sharps container</li><li>NEVER recap, bend, or shear needles</li><li>Never leave sharps unattended</li><li>If needlestick: Wash immediately, report, seek evaluation</li></ul><h2>Exposure Control Plan</h2><ul><li>Your employer must have a written plan</li><li>You should know your facility's procedures</li><li>Post-exposure prophylaxis (PEP) available</li><li>Free testing and vaccinations provided</li></ul><h2>Equipment Disinfection</h2><ul><li>Work surfaces: 70% alcohol or hospital-grade disinfectant</li><li>Between patients always</li><li>End of shift minimum</li></ul>",

        content: "<h2>Patient Rights</h2><ul><li><strong>Informed consent:</strong> Explain what you're doing and why</li><li><strong>Privacy:</strong> Use screens/curtains during blood draw</li><li><strong>Confidentiality (HIPAA):</strong> Never discuss patient info</li><li><strong>Right to refuse:</strong> Respect their decision</li><li><strong>Access to records:</strong> Patients can request their lab results</li></ul><h2>HIPAA Violations (Federal Crime)</h2><ul><li>Discussing patient results at lunch</li><li>Looking at charts without clinical need</li><li>Posting about patients on social media</li><li>Leaving patient info visible</li><li><strong>Penalty:</strong> Up to $100,000 per violation</li></ul><h2>Scope of Practice</h2><p>As a phlebotomist you CAN:</p><ul><li>Draw blood via venipuncture</li><li>Perform capillary punctures</li><li>Collect urine specimens</li><li>Label and transport specimens</li></ul><p>As a phlebotomist you CANNOT:</p><ul><li>Diagnose conditions</li><li>Interpret lab results</li><li>Prescribe treatment</li><li>Give medical advice</li><li>Access patient records without need</li></ul><h2>Documentation</h2><ul><li>Chart all attempts (successful and failed)</li><li>Note any complications</li><li>Accurate labeling is legal documentation</li><li>Incomplete documentation = liability</li></ul>",

        quiz: [
          { q: "The order of draw prevents:", opts: ["A) Patient discomfort", "B) Needle breakage", "C) Cross-contamination between tubes", "D) Patient allergies"], correct: 2, exp: "Correct order prevents additives from contaminating other specimens." },
          { q: "ASPT certification is valid for:", opts: ["A) 1 year", "B) 2 years", "C) 3 years", "D) 5 years"], correct: 2, exp: "ASPT certification requires renewal every 3 years." },
          { q: "Your primary responsibility as a phlebotomist is:", opts: ["A) Diagnosing disease", "B) Patient safety and specimen quality", "C) Interpreting results", "D) Prescribing treatment"], correct: 1, exp: "Patient safety and specimen integrity are the foundation of phlebotomy." },
          { q: "Median cubital vein is preferred because:", opts: ["A) It's deeper", "B) It's easily accessible and less painful", "C) It requires no tourniquet", "D) It's only for veins"], correct: 1, exp: "Median cubital is accessible, easily found, and better tolerated by patients." }
        ]
      }
    ]
  };

  let currentModule = 0;

  function initCourse() {
    renderModulesList();
    renderModule(0);
    updateProgress();
  }

  function renderModulesList() {
    const list = document.getElementById('modulesList');
    list.innerHTML = '';

    COURSE_DATA.modules.forEach((mod, idx) => {
      const li = document.createElement('li');
      li.className = 'module-item';
      const btn = document.createElement('button');
      btn.className = 'module-btn';
      if (idx === currentModule) btn.classList.add('active');
      if (isModuleCompleted(idx)) btn.classList.add('completed');
      btn.textContent = `Module ${mod.id}: ${mod.title}`;
      btn.onclick = () => selectModule(idx);
      li.appendChild(btn);
      list.appendChild(li);
    });
  }

  function selectModule(idx) {
    currentModule = idx;
    renderModulesList();
    renderModule(idx);
    document.querySelector('.main').scrollTop = 0;
  }

  function renderModule(idx) {
    const mod = COURSE_DATA.modules[idx];
    const html = document.getElementById('content');

    let output = `
      <h1>${mod.title}</h1>
      <div class="module-meta">
        <div class="meta-item"><strong>Module:</strong> ${mod.id} of ${COURSE_DATA.modules.length}</div>
        <div class="meta-item"><strong>Progress:</strong> <span id="moduleProgress">0</span>%</div>
      </div>
      <div>${mod.content}</div>
    `;

    if (mod.quiz && mod.quiz.length > 0) {
      output += `<div class="quiz-section"><h2 class="quiz-title">Module Quiz</h2>
        <div class="quiz-intro">Score 70%+ to complete this module.</div>`;

      mod.quiz.forEach((q, qidx) => {
        output += `
          <div class="question-block">
            <div class="question-num">Question ${qidx + 1}</div>
            <div class="question-text">${q.q}</div>
            <div class="options">
              ${q.opts.map((opt, oidx) => `
                <div class="option">
                  <label>
                    <input type="radio" name="q${qidx}" value="${oidx}">
                    ${opt}
                  </label>
                </div>
              `).join('')}
            </div>
            <div class="answer-feedback" id="feedback${qidx}"></div>
          </div>
        `;
      });

      output += `
        <button class="btn-submit" onclick="submitQuiz(${idx})">Submit Quiz</button>
        <div class="quiz-result" id="quizResult"></div>
      `;
      output += '</div>';
    }

    output += `
      <div class="nav-buttons">
        <button class="btn-nav" onclick="selectModule(${idx - 1})" ${idx === 0 ? 'disabled' : ''}>← Previous</button>
        <button class="btn-nav" onclick="selectModule(${idx + 1})" ${idx === COURSE_DATA.modules.length - 1 ? 'disabled' : ''}>Next →</button>
      </div>
    `;

    html.innerHTML = output;
  }

  function submitQuiz(moduleIdx) {
    const mod = COURSE_DATA.modules[moduleIdx];
    let score = 0;

    mod.quiz.forEach((q, idx) => {
      const selected = document.querySelector(`input[name="q${idx}"]:checked`);
      const feedback = document.getElementById(`feedback${idx}`);

      if (selected && parseInt(selected.value) === q.correct) {
        score++;
        feedback.className = 'answer-feedback show correct';
        feedback.innerHTML = `<strong>✓ Correct!</strong> ${q.exp}`;
      } else {
        feedback.className = 'answer-feedback show incorrect';
        feedback.innerHTML = `<strong>✗ Incorrect.</strong> ${q.exp}`;
      }
    });

    const percentage = Math.round((score / mod.quiz.length) * 100);
    const result = document.getElementById('quizResult');

    if (percentage >= 70) {
      result.className = 'quiz-result show';
      result.innerHTML = `<h3>Great Job! You Passed! 🎉</h3><p>Score: ${percentage}%</p>`;
      markModuleCompleted(moduleIdx);
      updateProgress();
    } else {
      result.className = 'quiz-result show';
      result.innerHTML = `<h3>Score: ${percentage}%</h3><p>Review the material and try again (70% required).</p>`;
    }
  }

  function markModuleCompleted(idx) {
    localStorage.setItem(`phlebotomy_mod_${idx}`, 'true');
  }

  function isModuleCompleted(idx) {
    return localStorage.getItem(`phlebotomy_mod_${idx}`) === 'true';
  }

  function updateProgress() {
    const total = COURSE_DATA.modules.length;
    let completed = 0;
    for (let i = 0; i < total; i++) {
      if (isModuleCompleted(i)) completed++;
    }
    const percent = Math.round((completed / total) * 100);
    document.getElementById('navProgress').textContent = percent;
    localStorage.setItem('progress_phlebotomy', percent);
  }

  window.addEventListener('load', initCourse);
</script>

</body>
</html>
